<!-- სემანტიკური თეგი - tag,რომელსაც ტექნიკური მნიშვნელობა გააჩნია -->
 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
 </head>
 <body>
      <h1>First tag</h1>
      <p><b>This is the bold tag</b> This is normal</p>
      <h1>Second tag</h1>
      <p><i>This is italic</i> This is normal</p>
      <h1>Third tag</h1>
      <p><u>This is underlined tag</u> This is normal</p>
      <h1>Fourth tag</h1>
      <p><strong>This is a strong tag, semantic</strong> This is normal</p>
      <h1>Fifth tag</h1>
      <p><em>This is em</em> This is normal</p>
 </body>
 </html>
